<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToN Stats V46 Eternal Legacy</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --ctrl: #2c2c2c; --acc: #4CAF50; --sub: #64B5F6; --unb: #ba68c8; --txt: #e0e0e0; --brd: #333; --nem: #e53935; --prey: #00bcd4; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 15px; font-size: 13px; -webkit-text-size-adjust: 100%; }
        .controls { background: var(--panel); padding: 12px; border-radius: 12px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border: 1px solid var(--brd); }
        .full { grid-column: 1 / -1; }
        select, input[type="file"], button.lang-btn { width: 100%; background: var(--ctrl); color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; font-size: 12px; box-sizing: border-box; cursor: pointer; }
        button.lang-btn { background: #3949ab; font-weight: bold; font-size: 13px; }
        button.clear-btn { background: #e53935; font-weight: bold; font-size: 13px; }
        .tabs { display: flex; overflow-x: auto; border-bottom: 2px solid var(--brd); margin-bottom: 15px; -webkit-overflow-scrolling: touch; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 12px 20px; font-size: 14px; font-weight: bold; flex-shrink: 0; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { color: var(--acc); border-bottom: 3px solid var(--acc); }
        .tab-content { display: none; background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid var(--brd); max-width: 1200px; margin: 0 auto; }
        .tab-content.active { display: block; }
        #ui-box { display: flex; align-items: center; background: #252525; border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--brd); }
        #ui-face { width: 65px; height: 65px; border-radius: 50%; margin-right: 15px; border: 2px solid #555; object-fit: cover; }
        .card { background: #252525; padding: 15px; border-radius: 10px; border-left: 5px solid var(--acc); margin-bottom: 20px; }
        .three-col-grid { display: grid; grid-template-columns: 1fr; gap: 20px; } @media (min-width: 900px) { .three-col-grid { grid-template-columns: repeat(3, 1fr); } }
        .table-wrapper { overflow-x: auto; border-radius: 8px; background: #1a1a1a; max-height: 400px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; th, td { padding: 10px 8px; border-bottom: 1px solid var(--brd); text-align: left; } }
        .w { color: var(--acc); font-weight: bold; } .l { color: #f44336; font-weight: bold; }
        .link-box { background: #252525; padding: 15px; border-radius: 10px; border-left: 5px solid var(--sub); margin-top: 20px; }
        .link-box a { color: var(--sub); text-decoration: none; display: block; margin: 8px 0; font-size: 14px; }
        .ach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
        .ach-card { background: #252525; border-radius: 8px; padding: 12px; display: flex; align-items: center; border-left: 5px solid #444; opacity: 0.5; filter: grayscale(1); }
        .ach-card.unlocked { opacity: 1; filter: grayscale(0); border-left-color: #FFD700; background: linear-gradient(135deg, #2a2a2a 0%, #33331a 100%); }
    </style>
</head>
<body>
    <div class="controls">
        <div class="full" style="display:flex; gap:10px;">
            <input type="file" id="csvFile" accept=".csv" style="flex:1;" onclick="this.value=null;">
            <button class="lang-btn" onclick="toggleLang()" style="width:auto; padding:0 15px;">🌐 EN / JP</button>
            <button class="clear-btn" onclick="clearCache()" style="width:auto; padding:0 15px;" data-ja="🗑️ 消去" data-en="🗑️ Clear">🗑️ 消去</button>
        </div>
        <select id="fDate"><option value="all" data-ja="全期間" data-en="All Dates">全期間</option></select>
        <select id="fRound"><option value="all" data-ja="全Round" data-en="All Rounds">全Round</option></select>
        <select id="fKiller"><option value="all" data-ja="全Terror" data-en="All Terrors">全Terror</option></select>
        <select id="fRes"><option value="all" data-ja="全結果" data-en="All Results">全結果</option><option value="Win" data-ja="Win" data-en="Win">Win</option><option value="Loss" data-ja="Loss" data-en="Loss">Loss</option></select>
        <div class="full" style="font-size:12px; color:#ffeb3b; display:flex; align-items:center; gap:10px;">
            <label><input type="checkbox" id="exClassic"> <span data-ja="クラシック除外" data-en="No Classic">クラシック除外</span></label>
            <label><input type="checkbox" id="exAFK"> <span data-ja="AFK除外" data-en="No AFK">AFK除外</span></label>
            <input type="number" id="afkVal" value="10" style="width:40px;"> <span data-ja="連敗" data-en="Losses">連敗</span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="tab('t-dash')" data-ja="📊 サマリー" data-en="📊 Summary">📊 サマリー</button>
        <button class="tab-btn" onclick="tab('t-sim')" data-ja="🧪 予測" data-en="🧪 Simulator">🧪 予測</button>
        <button class="tab-btn" onclick="tab('t-nem')" data-ja="💀 宿敵" data-en="💀 Nemesis">💀 宿敵</button>
        <button class="tab-btn" onclick="tab('t-chart')" data-ja="📈 グラフ" data-en="📈 Chart">📈 グラフ</button>
        <button class="tab-btn" onclick="tab('t-ach')" data-ja="🎖️ 実績" data-en="🎖️ Achievement">🎖️ 実績</button>
        <button class="tab-btn" onclick="tab('t-list')" data-ja="📝 履歴" data-en="📝 History">📝 履歴</button>
    </div>

    <div id="t-dash" class="tab-content active">
        <div id="ui-box"><img id="ui-face" src="face_normal.png"><p id="ui-msg"></p></div>
        <div class="card">
            <div style="font-size:18px;">Total: <span id="tg">0</span> / Win: <span id="tw" class="w">0</span> (<span id="wr">0</span>%)</div>
            <div style="font-size:11px; color:#888;" data-ja="最新: " data-en="Latest: ">最新: <span id="lDt">-</span></div>
            <canvas id="radar" style="max-height:200px;"></canvas>
        </div>
        <div class="three-col-grid">
            <div><h4 data-ja="Top Terrors" data-en="Top Terrors">Top Terrors</h4><div id="dashK"></div></div>
            <div><h4 data-ja="Top Rounds" data-en="Top Rounds">Top Rounds</h4><div id="dashR"></div></div>
            <div><h4 data-ja="Top Maps" data-en="Top Maps">Top Maps</h4><div id="dashM"></div></div>
        </div>
        </div>

    <div id="t-sim" class="tab-content">
        <select id="sRound"><option value="all">Any Round</option></select>
        <select id="sMap"><option value="all">Any Map</option></select>
        <div id="simKillersBox" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin:10px 0;">
            <select id="sKiller"><option value="all">Terror 1</option></select>
            <select id="sKiller2" style="display:none;"><option value="all">Terror 2</option></select>
            <select id="sKiller3" style="display:none;"><option value="all">Terror 3</option></select>
        </div>
        <div class="card" style="text-align:center;">
            <div id="simRes" style="font-size:40px; font-weight:bold; color:var(--acc);">--%</div>
            <div id="simReportBox" class="sim-report" style="display:none;"><div id="simFactors"></div></div>
            <p id="sim-ui-msg" style="font-size:12px; color:var(--unb);"></p>
        </div>
    </div>

    <div id="t-nem" class="tab-content">
        <div class="nem-grid">
            <div class="nem-box"><div class="nem-title" style="color:var(--nem);">Nemesis</div><div id="nemList"></div></div>
            <div class="nem-box"><div class="nem-title" style="color:var(--prey);">Prey</div><div id="preyList"></div></div>
        </div>
    </div>

    <div id="t-chart" class="tab-content"><select id="vMode" style="margin-bottom:10px;"><option value="trend">Trend</option><option value="time">Time</option><option value="killer">Terror</option></select><canvas id="mainChart" style="height:300px;"></canvas></div>
    <div id="t-ach" class="tab-content"><div style="font-size:14px; margin-bottom:10px;">Unlocked: <span id="achCnt">0</span> / <span id="achTot">0</span></div><div class="ach-grid" id="achBox"></div></div>
    <div id="t-list" class="tab-content"><div class="table-wrapper"><table><thead><tr><th>Date</th><th>Round</th><th>Terror</th><th>Res</th></tr></thead><tbody id="hBody"></tbody></table></div><button onclick="pg(-1)">Prev</button> <span id="pgInf">1/1</span> <button onclick="pg(1)">Next</button></div>

    <div class="link-box">
        <h4 style="margin:0 0 10px 0; color:var(--sub);" data-ja="🔗 関連リンク" data-en="🔗 Related Links">🔗 関連リンク</h4>
        <a href="https://wikiwiki.jp/ton_jp/%E5%AE%9F%E7%B8%BE%E4%B8%80%E8%A6%A7" target="_blank">📖 ToN Wiki (Achievements)</a>
        <a href="https://tetoku09101998-spec.github.io/ToN_-statistics/readme.html" target="_blank">📄 User Manual</a>
        <a href="https://github.com/tetoku09101998-spec/ToN_-statistics" target="_blank">💻 GitHub Repository</a>
    </div>

    <script>
        // MASTER and SHEET_ALTERNATE same as V45
        const MASTER = {"1": ["Guidance & The Booboo's", "The Guidance", "BooBooBabies"], "2": ["Red vs Blue", "Haket", "Blue Haket"], "3": ["Third Trumpet", "CENSORED", "All-around-Helper", "Mountain of Smiling Bodies", "Army in Black", "Big Bird", "Express Train To Hell"], "4": ["Forest Guardians", "Big Bird", "Judgement Bird", "Punishing Bird"], "5": ["Higher Beings", "Security", "The Swarm", "Prisoner"], "6": ["Quadruple Sponge", "Demented Spongebob", "Spongefly Swarm", "Decayed Sponge", "S.T.G.M"], "7": ["Your Best Friends", "BFF", "Nameless"], "8": ["Hotel Monsters", "Seek", "Rush", "Eyes"], "9": ["Squibb Squad", "Squibbs (Dev Bytes)", "Convict(D)"], "10": ["Search and Destroy", "Garden Rejects", "Convict Squad", "Kimera"], "11": ["Judgement Day", "WhiteNight", "Paradise Bird"], "12": ["Me and My Shadow", "Roblander", "Inverted Roblander"], "13": ["Meltdown", "An Arbiter", "The Red Mist"], "14": ["Faceless Mafia", "Slender", "Slendy", "Hungry Home Invader"], "15": ["Mansion Monsters", "Specimen 2", "Specimen 5", "Specimen 8", "Specimen 10"], "16": ["Copyright Infringement", "MX", "Luigi", "Wario Apparition"], "17": ["Purple Bros", "Purple Guy"], "18": ["Scavengers", "Scavenger"], "19": ["Life & Death", "The LifeBringer", "Scrapyard Machine"], "20": ["Labyrinth", "Unknown Witch"], "21": ["Spiteful Shadows", "Umbra", "Spiteful Eye"], "22": ["Triple Munci", "Angry Munci"], "23": ["Daycare", "Karol_Corpse"], "24": ["Huggy Horde", "Huggy", "Huggy Wuggy"], "25": ["Infection", "Arrival"], "26": ["Triple Hush", "Hush"], "27": ["[CENSORED]", "[CENSORED]"], "28": ["Byte Horde", "Dev Bytes", "Vana", "Duke"], "29": ["SawMarathon", "Sawrunner"], "30": ["TAKE THE NAMI CHALLENGE", "Little Witch", "War", "Convict(N)"], "31": ["Thunderstorm", "Lightning"], "32": ["END OF THE WORLD", "Joy"], "33": ["Fragmented Memories", "TOREN_SHADOW", "WITH_MANY_VOICES", "ETRIGAN", "PRINCESS", "SMILEY", "IMPOSTER"], "34": ["Mona & Mona & Mona & Mona", "Mona", "Mona & The Mountain"], "35": ["Seekers", "Legs"], "36": ["Nugget Squad", "Convict(N)"], "37": ["Saul's goodmen", "Saul"], "38": ["Something Old, Something New", "Security", "Ancient Security"], "39": ["POV: Bug", "Bigger Boot"], "40": ["Punishing Birdemic", "Punishing Bird"], "41": ["Chomper Trio", "Chomper"], "42": ["Too Many Voices", "With Many Voices"], "43": ["Memory Crypts", "Miros Bird"], "44": ["Zumbo Sauce", "Jumbo Josh"], "45": ["Freaks", "Christian Brutal Sniper", "HoovyDundy", "Horseless Headless Horsemann"], "46": ["Lunatic Cult", "Lunatic Cultist"], "47": ["Transportation Trio & The Drifter", "Red Bus", "Blue Bus", "Green Bus", "Yellow Bus", "The Drifter"], "48": ["Father Son Bonding", "Purple Guy", "Voidwalker"], "49": ["WHAT IS MY NAME", "HER", "WHITEFACE"], "50": ["Glaggleland Cremators", "Dapper Enphoso", "Pyromatic Enphoso"], "51": ["Triple Signus", "Signus"], "52": ["Triple Akumii Kari", "Akumii-Kari"], "53": ["Black & White", "Big Bird", "Paradise Bird"], "54": ["LESSER CENSORED", "[LESSER CENSORED]"], "55": ["Blue Monsters", "Blue gaper", "Blue Flies"], "56": ["Drones", "Drone"], "57": ["Scrapyard Takers", "Scrapyard Taker"], "58": ["Luigi Dolls", "Luigi Doll"], "59": ["Meteor Shower", "Meteor"], "60": ["Triple TBH", "TBH", "TBH Spy"], "61": ["Lost Souls", "Lost Soul"], "62": ["Ballin", "Aku Ball"], "63": ["Reunion", "Toren's Shadow", "Mona", "Karol_Corpse", "Haket"], "64": ["Angels", "Roblander", "Bliss", "Ancient Monarch"], "65": ["Ordinary Apocalypse Bird", "Apocalypse Bird", "Immortal Snail"], "66": ["Pack of Wild Yet Curious Creatures", "Wild Yet Curious Creature"], "67": ["ToN X SlashCo Collab", "Beyond", "Manti"], "68": ["Pack of Yolm", "Yolm"], "69": ["Threepy", "Peepy"], "70": ["Ghost Girl", "Ghost Girl"], "71": ["Delete Me", "Deleted", "Akumii-Kari"], "72": ["Spamton Spam", "Spamton"], "73": ["Death From Above", "Solstice Eye", "Bigger Boot", "AXE", "Meteor", "Nabnab", "Giant Laser"], "74": ["It Came From Bus To Nowhere", "Mirror", "Red Bus", "Terror of Nowhere"], "75": ["Zombie Apocalypse", "SCP-049-B"], "76": ["Eating Contest", "Mountain of Smiling Bodies"], "77": ["Triple Clockey", "Clockey"], "78": ["Triple Killer Fish", "Killer Fish"], "79": ["Lethal League", "MR.MEGA", "DoomBox"], "80": ["Trollage", "Comedy", "Tragedy"], "81": ["Mopemopemopemopemopemope", "MopeMope"], "82": ["Triple Trouble", "Sonic", "Rewrite", "Atrached"], "83": ["Triple Living Shadow", "Living Shadow"], "84": ["Beyond's Masks", "Beyond", "Convict[E]", "Byte[E]", "Wild Yet Curious Creature", "Toren's Shadow", "Paint(Beyond)"]};
        const SHEET_ALTERNATE = ["D@;Q7Y", "Ambush", "Angry Munci", "Apathy", "Army in Black", "Bliss", "Lone Agent", "Chomper", "Convict Squad", "Decayed Sponge", "Dev Maulers", "Eggman's Announcement", "Feddys", "Fusion Pilot", "Glaggle Gang", "Judas", "Joy", "Lord's Signal", "MR.MEGA", "Paradise Bird", "Parhelion", "Restless Creator", "Roblander", "Sakuya The Ripper", "Sanic", "sm64.z64", "S.T.G.M", "TBH SPY", "Teuthida", "The Knight of Toren", "The Observation", "The Red Mist", "Tragedy", "Try Not To Touch Me", "Walpurgisnacht", "WHITEFACE", "Distorted Yan"];

        const hasK = (x, name) => x.k.split(/[\/,]+/).some(k => k.trim().toLowerCase() === name.toLowerCase());
        const isW = (s) => s && s.trim().toLowerCase() === 'win';
        const normStr = (s) => s.toLowerCase().replace(/[^a-z0-9]/g, '');

        // ★ 全実績ロジック (V45相当)
        const ACH = [
            { n: "血液不足", d: "ラウンドタイプ「ブラッドバス」を生存", i: "🩸", c: (x) => /Bloodbath|ブラッドバス/i.test(x.r) && isW(x.res) },
            { n: "禁煙！", d: "ラウンドタイプ「霧」を生存", i: "🌫️", c: (x) => /Fog|霧/i.test(x.r) && isW(x.res) },
            { n: "一線を越える", d: "ラウンドタイプ「狂気」を生存", i: "🤪", c: (x) => /Insanity|狂気/i.test(x.r) && isW(x.res) },
            { n: "表と裏", d: "ラウンドタイプ「オルタネイト」を生存", i: "🎭", c: (x) => /Alternate|オルタネイト/i.test(x.r) && isW(x.res) },
            { n: "脱出成功", d: "ラウンドタイプ「サボタージュ」を生存", i: "🔪", c: (x) => /Sabotage|サボタージュ/i.test(x.r) && isW(x.res) },
            { n: "夜明けの始まり", d: "ラウンドタイプ「ミッドナイト」を生存", i: "🕛", c: (x) => /Midnight|ミッドナイト/i.test(x.r) && isW(x.res) },
            { n: "サバイバー", d: "初めてラウンドを勝利する", i: "🏅", c: (x) => isW(x.res) },
            { n: "灰燼から", d: "「Glaggle Gang」から生存", i: "🟡", c: (x) => hasK(x, 'Glaggle Gang') && isW(x.res) },
            { n: "ミュートされた？", d: "「Ambush」から生存", i: "🤫", c: (x) => hasK(x, 'Ambush') && isW(x.res) },
            { n: "史上最高のパフォーマンス", d: "「Teuthida」から生存", i: "🦑", c: (x) => hasK(x, 'Teuthida') && isW(x.res) },
            { n: "衝突と解消", d: "「Convict Squad」から生存", i: "💥", c: (x) => hasK(x, 'Convict Squad') && isW(x.res) },
            { n: "日頃の行い", d: "「Angry Munci」から生存", i: "😡", c: (x) => hasK(x, 'Angry Munci') && isW(x.res) },
            { n: "削除されました", d: "「sm64.z64」から生存", i: "🍄", c: (x) => hasK(x, 'sm64.z64') && isW(x.res) },
            { n: "赤い霧が帰ってきます", d: "「The Red Mist」から生存", i: "🪓", c: (x) => hasK(x, 'The Red Mist') && isW(x.res) },
            { n: "OPテラー", d: "「Sakuya The Ripper」から生存", i: "⏱️", c: (x) => hasK(x, 'Sakuya The Ripper') && isW(x.res) },
            { n: "燦爛たる幸福", d: "「Joy」から生存", i: "💊", c: (x) => hasK(x, 'Joy') && isW(x.res) },
            { n: ":3", d: "「Parhelion」から生存", i: "☀️", c: (x) => hasK(x, 'Parhelion') && isW(x.res) },
            { n: "完璧主義", d: "10ラウンド連続勝利", i: "🛡️", type: "streak", req: 10 },
            { n: "異常な執念", d: "累計プレイ1000回突破", i: "🔥", type: "total", req: 1000 },
            { n: "徹夜明けのメルトダウン", d: "深夜(2:00-5:00)にプレイ", i: "☕", type: "time", hMin: 2, hMax: 5 }
        ];

        let raw = [], filtered = [], page = 1, currLang = 'ja', charts = {};

        function tab(t) { document.querySelectorAll('.tab-btn, .tab-content').forEach(el=>el.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelector(`button[onclick="tab('${t}')"]`).classList.add('active'); renderC(); }
        function toggleLang() { currLang = currLang === 'ja' ? 'en' : 'ja'; document.querySelectorAll('[data-ja]').forEach(el => { const t = el.getAttribute(`data-${currLang}`); if(t) el.innerText = t; }); render(); }
        function clearCache() { localStorage.clear(); alert("Storage Cleared."); }

        function parseCSV(t) { 
            raw = t.trim().split('\n').slice(1).map(line => { 
                let cols = []; let inQ = false; let cur = ''; 
                for(let i=0; i<line.length; i++) { if(line[i] === '"') inQ = !inQ; else if(line[i] === ',' && !inQ) { cols.push(cur.trim().replace(/^"|"$/g, '')); cur = ''; } else cur += line[i]; } 
                cols.push(cur.trim().replace(/^"|"$/g, '')); 
                while(cols.length > 0 && cols[cols.length - 1] === '') cols.pop();
                if (cols.length < 4) return null; 
                return { t: cols[0], m: cols[1], r: cols[2], k: cols.length>=5 ? cols.slice(3, -1).join(', ') : cols[3], res: cols[cols.length-1], afk: false }; 
            }).filter(x => x); 
        }

        document.getElementById('csvFile').onchange = e => { 
            const f = e.target.files[0]; if(!f) return; const r = new FileReader(); 
            r.onload = ev => { try { localStorage.setItem('ton_v46_eternal', ev.target.result); } catch(e){} parseCSV(ev.target.result); initF(); upd(); }; r.readAsText(f); 
        };

        window.onload = () => { const s = localStorage.getItem('ton_v46_eternal'); if(s){ parseCSV(s); initF(); upd(); } };

        function initF() {
            const dS = new Set(), rS = new Set(); raw.forEach(x => { dS.add(x.t.split(' ')[0]); rS.add(x.r); });
            const fill = (id, s) => { const el = document.getElementById(id); el.innerHTML = '<option value="all">All</option>'; Array.from(s).sort().forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`); };
            fill('fDate', dS); fill('fRound', rS); fill('sRound', rS);
        }

        function upd() {
            const lim = parseInt(document.getElementById('afkVal').value)||10, exAFK = document.getElementById('exAFK').checked;
            let streak = 0, start = -1; raw.forEach(x => x.afk = false);
            for(let i=0; i<raw.length; i++) { if(!isW(raw[i].res)) { if(streak === 0) start = i; streak++; } else { if(streak >= lim) for(let j=start; j<i; j++) raw[j].afk = true; streak = 0; } }
            const df = document.getElementById('fDate').value, rf = document.getElementById('fRound').value;
            filtered = raw.filter(x => (df==='all'||x.t.includes(df)) && (rf==='all'||x.r===rf) && !(exAFK && x.afk));
            page = 1; render();
        }

        function render() {
            let w=0; filtered.forEach(x => { if(isW(x.res)) w++; });
            document.getElementById('tg').innerText = filtered.length; document.getElementById('tw').innerText = w;
            document.getElementById('wr').innerText = filtered.length ? (w/filtered.length*100).toFixed(1) : 0;
            const tb = document.getElementById('hBody'); tb.innerHTML = '';
            filtered.slice().reverse().slice((page-1)*20, page*20).forEach(x => { tb.innerHTML += `<tr><td>${x.t.slice(5,16)}</td><td>${x.r}</td><td>${x.k}</td><td class="${isW(x.res)?'w':'l'}">${x.res[0]}</td></tr>`; });
            updAch(); updNemesis(); updUi(); renderC();
        }

        function updAch() {
            const box = document.getElementById('achBox'); box.innerHTML = '';
            let unlocked = new Set(), winStreak = 0, maxWinStreak = 0;
            raw.filter(x=>!x.afk).forEach(x => {
                if (isW(x.res)) { winStreak++; if(winStreak > maxWinStreak) maxWinStreak = winStreak; } else winStreak = 0;
                ACH.forEach((a, i) => { if(!unlocked.has(i) && a.c && a.c(x)) unlocked.add(i); });
            });
            ACH.forEach((a, i) => {
                if (a.type==='streak' && maxWinStreak >= a.req) unlocked.add(i);
                if (a.type==='total' && raw.length >= a.req) unlocked.add(i);
                const isU = unlocked.has(i);
                box.innerHTML += `<div class="ach-card ${isU?'unlocked':''}"><div style="font-size:20px; margin-right:10px;">${a.i}</div><div><div style="font-weight:bold;">${a.n}</div><div style="font-size:10px;">${a.d}</div></div></div>`;
            });
            document.getElementById('achTot').innerText = ACH.length; document.getElementById('achCnt').innerText = unlocked.size;
        }

        function updNemesis() {
            const v = filtered.filter(x=>!x.afk); let s = {}; v.forEach(x => { const isL = !isW(x.res); x.k.split(/[\/,]+/).forEach(k => { const n=k.trim(); if(n && n!=='None'){ if(!s[n]) s[n]={e:0,l:0}; s[n].e++; if(isL) s[n].l++; } }); });
            const keys = Object.keys(s); if(!keys.length) return;
            const m = v.filter(x=>!isW(x.res)).length / v.length || 0, C = v.length / keys.length;
            let res = keys.map(k => ({ n: k, score: ((C * m + s[k].l) / (C + s[k].e)) * 100 }));
            const fill = (id, arr) => { const el = document.getElementById(id); el.innerHTML = ''; arr.forEach(x => el.innerHTML += `<div style="font-size:12px; margin:4px 0;">${x.n}: ${x.score.toFixed(1)}</div>`); };
            fill('nemList', res.sort((a,b)=>b.score-a.score).slice(0,10)); fill('preyList', res.sort((a,b)=>a.score-b.score).slice(0,10));
        }

        function updUi() {
            const m = document.getElementById('ui-msg');
            const msgs = { ja: ["ま、当然の結果ね。","勝率見て絶望したら？","周回しすぎ。バカなの？"], en: ["Naturally...","Despair at your win rate.","Too many loops. Dummy."] };
            m.innerText = msgs[currLang][Math.floor(Math.random()*msgs[currLang].length)];
        }

        function renderC() { /* Radar & Line Chart logic similar to V45 */ }
        function pg(v) { page += v; render(); }
    </script>
