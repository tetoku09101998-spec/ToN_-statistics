<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToN Stats Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --ctrl: #2c2c2c; --acc: #4CAF50; --sub: #64B5F6; --unb: #ba68c8; --txt: #e0e0e0; --brd: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 10px; font-size: 14px; }
        .controls { background: var(--panel); padding: 10px; border-radius: 12px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border: 1px solid var(--brd); }
        .full { grid-column: 1 / -1; }
        select, input[type="file"] { width: 100%; background: var(--ctrl); color: #fff; border: 1px solid #444; padding: 8px; border-radius: 6px; font-size: 12px; box-sizing: border-box; }
        .tabs { display: flex; overflow-x: auto; border-bottom: 2px solid var(--brd); margin-bottom: 10px; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 10px 15px; font-size: 14px; font-weight: bold; flex-shrink: 0; }
        .tab-btn.active { color: var(--acc); border-bottom: 3px solid var(--acc); }
        .tab-content { display: none; background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid var(--brd); }
        .tab-content.active { display: block; }
        #ui-box { display: flex; align-items: center; background: #252525; border-radius: 10px; padding: 10px; margin-bottom: 10px; border: 1px solid var(--sub); }
        #ui-face { width: 55px; height: 55px; border-radius: 50%; margin-right: 10px; border: 1px solid #555; flex-shrink: 0; object-fit: cover; }
        .unb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        .unb-card { background: #2c2c2c; padding: 10px; border-radius: 8px; border-top: 3px solid var(--unb); font-size: 10px; text-align: left; line-height: 1.3; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 8px 4px; border-bottom: 1px solid var(--brd); text-align: left; }
    </style>
</head>
<body>
    <div class="controls">
        <div class="full"><input type="file" id="csvFile" accept=".csv"></div>
        <select id="fDate"><option value="all">全期間</option></select>
        <select id="fRound"><option value="all">全種類</option></select>
        <select id="fKiller" class="full"><option value="all">全テラー</option></select>
        <div class="full" style="font-size:11px; color:#ffeb3b;"><label><input type="checkbox" id="exClassic"> クラシック除外</label></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="tab('t-dash')">📊 Summary</button>
        <button class="tab-btn" onclick="tab('t-chart')">📈 Analytics</button>
        <button class="tab-btn" onclick="tab('t-list')">📝 History</button>
        <button class="tab-btn" onclick="tab('t-unb')">🌀 Unbound</button>
    </div>

    <div id="t-dash" class="tab-content active">
        <div id="ui-box"><img id="ui-face" src="face_normal.png"><p id="ui-msg" style="font-size:12px; margin:0; text-align:left;"></p></div>
        <div style="background:#252525; padding:10px; border-radius:8px; border-left:4px solid var(--acc); text-align:left;">
            <div style="font-size:16px; font-weight:bold;"><span id="tw">0</span>W / <span id="tg">0</span>T</div>
            <div style="color:var(--acc); font-size:13px;">Rate: <span id="wr">0</span>%</div>
        </div>
        <div style="margin-top:10px; background:#252525; border-radius:8px;"><canvas id="radar" height="200"></canvas></div>
    </div>

    <div id="t-chart" class="tab-content">
        <select id="vMode" style="margin-bottom:10px;"><option value="trend">推移</option><option value="time">時間</option><option value="killer">テラー</option></select>
        <div style="height:280px;"><canvas id="mainChart"></canvas></div>
    </div>

    <div id="t-list" class="tab-content">
        <div style="overflow-x:auto;"><table><thead><tr><th>Time</th><th>Type</th><th>Terror</th><th>R</th></tr></thead><tbody id="hBody"></tbody></table></div>
        <div style="margin-top:10px;"><button onclick="pg(-1)">◀</button> <span id="pgInf">1/1</span> <button onclick="pg(1)">▶</button></div>
    </div>

    <div id="t-unb" class="tab-content"><div class="unb-grid" id="unbL"></div></div>

    <script>
        // ★ 84セット完全収録版
        const MASTER = {
            "1":["The Guidance","BooBooBabies"],"2":["Haket","Blue Haket","Red vs Blue"],"3":["CENSORED","All-around-Helper","Mountain of Smiling Bodies","Army in Black","Big Bird","Express Train To Hell"],"4":["Big Bird","Judgement Bird","Punishing Bird"],"5":["Security","The Swarm","Prisoner"],"6":["Demented Spongebob","Spongefly Swarm","Decayed Sponge","S.T.G.M"],"7":["BFF","Nameless"],"8":["Seek","Rush","Eyes"],"9":["Squibbs (Dev Bytes)","Convict(D)"],"10":["Convict Squad","Kimera","Search and Destroy","Garden Rejects"],"11":["WhiteNight","Paradise Bird"],"12":["Roblander","Inverted Roblander"],"13":["An Arbiter","The Red Mist"],"14":["Slender","Slendy","Hungry Home Invader"],"15":["Specimen 2","Specimen 5","Specimen 8","Specimen 10"],"16":["MX","Luigi","Wario Apparition"],"17":["Purple Guy"],"18":["Scavenger"],"19":["The LifeBringer","Scrapyard Machine"],"20":["Unknown Witch"],"21":["Umbra","Spiteful Eye"],"22":["Angry Munci"],"23":["Karol_Corpse"],"24":["Huggy","Huggy Wuggy"],"25":["Arrival"],"26":["Hush"],"27":["[CENSORED]"],"28":["Dev Bytes","Vana","Duke"],"29":["Sawrunner","SawMarathon"],"30":["Little Witch","War","Convict(N)"],"31":["Lightning"],"32":["Joy"],"33":["TOREN_SHADOW","WITH_MANY_VOICES","ETRIGAN","PRINCESS","SMILEY","IMPOSTER"],"34":["Mona"],"35":["Legs"],"36":["Convict(N)"],"37":["Saul"],"38":["Security","Ancient Security"],"39":["Bigger Boot"],"40":["Punishing Bird"],"41":["Chomper"],"42":["With Many Voices"],"43":["Miros Bird"],"44":["Jumbo Josh"],"45":["Christian Brutal Sniper","HoovyDundy","Horseless Headless Horsemann"],"46":["Lunatic Cultist"],"47":["Red Bus","Blue Bus","Green Bus","Yellow Bus","The Drifter"],"48":["Purple Guy","Voidwalker"],"49":["HER","WHITEFACE"],"50":["Dapper Enphoso","Pyromatic Enphoso"],"51":["Signus"],"52":["Akumii-Kari","Triple Akumii Kari"],"53":["Big Bird","Paradise Bird"],"54":["LESSER CENSORED"],"55":["Blue gaper","Blue Flies"],"56":["Drone"],"57":["Scrapyard Taker"],"58":["Luigi Doll"],"59":["Meteor"],"60":["TBH","TBH Spy"],"61":["Lost Soul"],"62":["Aku Ball"],"63":["Toren's Shadow","Mona","Karol_Corpse","Haket"],"64":["Roblander","Bliss","Ancient Monarch"],"65":["Apocalypse Bird","Immortal Snail"],"66":["Wild Yet Curious Creature"],"67":["Beyond","Manti"],"68":["Yolm"],"69":["Peepy"],"70":["Ghost Girl"],"71":["Deleted","Akumii-Kari"],"72":["Spamton"],"73":["Solstice Eye","Bigger Boot","AXE","Meteor","Nabnab","Giant Laser"],"74":["Mirror","Red Bus","Terror of Nowhere"],"75":["SCP-049-B"],"76":["Mountain of Smiling Bodies"],"77":["Clockey"],"78":["Killer Fish"],"79":["MR.MEGA","DoomBox"],"80":["Comedy","Tragedy"],"81":["MopeMope"],"82":["Sonic","Rewrite","Atrached"],"83":["Living Shadow"],"84":["Beyond","Convict[E]","Byte[E]","Wild Yet Curious Creature","Toren's Shadow","Paint(Beyond)"]
        };

        let raw = [], filtered = [], page = 1, charts = {};
        const isW = (s) => s && s.trim().toLowerCase() === 'win';

        document.getElementById('csvFile').onchange = e => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = ev => {
                raw = ev.target.result.trim().split('\n').slice(1).map(l => {
                    const c = l.split(','); if (c.length < 5) return null;
                    return { t: c[0].trim(), r: c[2].trim(), k: c.slice(3, -1).join(',').trim(), res: c[c.length-1].trim() };
                }).filter(x => x);
                initF(); upd();
            }; r.readAsText(f);
        };

        function initF() {
            const dS = new Set(), rS = new Set(), kS = new Set();
            raw.forEach(x => { dS.add(x.t.split(' ')[0]); rS.add(x.r); if(x.k!=='None') x.k.split('/').forEach(i=>kS.add(i.trim())); });
            const f = (id, s, rev=false) => { 
                const el = document.getElementById(id); el.innerHTML = '<option value="all">全て</option>'; 
                let a = Array.from(s).sort(); if(rev) a.reverse();
                a.forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`);
            };
            f('fDate', dS, true); f('fRound', rS); f('fKiller', kS);
        }

        document.querySelectorAll('select, input[type=checkbox]').forEach(el => el.onchange = upd);

        function upd() {
            const df = document.getElementById('fDate').value, rf = document.getElementById('fRound').value, kf = document.getElementById('fKiller').value, exc = document.getElementById('exClassic').checked;
            filtered = raw.filter(x => (df==='all'||x.t.includes(df)) && (rf==='all'||x.r===rf) && (kf==='all'||x.k.includes(kf)) && !(exc && x.r.includes('Classic')));
            page = 1; render();
        }

        function tab(t) { document.querySelectorAll('.tab-btn, .tab-content').forEach(el=>el.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelector(`button[onclick="tab('${t}')"]`).classList.add('active'); renderC(); }

        function render() {
            let w=0; filtered.forEach(x => { if(isW(x.res)) w++; });
            document.getElementById('tg').innerText = filtered.length;
            document.getElementById('tw').innerText = w;
            document.getElementById('wr').innerText = filtered.length ? (w/filtered.length*100).toFixed(1) : 0;
            const tb = document.getElementById('hBody'), rev = filtered.slice().reverse(), tp = Math.ceil(rev.length/30)||1;
            tb.innerHTML = ''; rev.slice((page-1)*30, page*30).forEach(x => {
                tb.innerHTML += `<tr><td>${x.t.slice(5,16)}</td><td>${x.r.slice(0,5)}</td><td>${x.k.slice(0,8)}</td><td class="${isW(x.res)?'w':'l'}">${x.res[0]}</td></tr>`;
            });
            document.getElementById('pgInf').innerText = `${page}/${tp}`;
            updUnb(); updUi(); renderC();
        }

        function pg(v) { page += v; render(); }

        function updUnb() {
            const l = document.getElementById('unbL'), s = {}; l.innerHTML = '';
            filtered.forEach(x => {
                if (x.r.includes('Unbound') || x.r.includes('アンバウンド')) {
                    let id = "Unknown", ks = x.k.split('/').map(k => k.trim());
                    for (const [sid, list] of Object.entries(MASTER)) {
                        if (ks.some(k => list.some(m => k.toLowerCase().includes(m.toLowerCase())))) { id = sid; break; }
                    }
                    if (!s[id]) s[id] = new Set(); ks.forEach(k => s[id].add(k));
                }
            });
            Object.keys(s).sort((a,b)=>a==="Unknown"?1:b==="Unknown"?-1:parseInt(a)-parseInt(b)).forEach(id => {
                l.innerHTML += `<div class="unb-card"><strong style="color:var(--unb);">#${id}</strong><div style="opacity:0.8; margin-top:4px;">${Array.from(s[id]).join('<br>')}</div></div>`;
            });
        }

        function renderC() {
            const rc = document.getElementById('radar').getContext('2d'); if(charts.r) charts.r.destroy();
            let aT=0, aW=0, cT=0, cW=0, sT=0, sW=0;
            filtered.forEach(x => { const win = isW(x.res); aT++; if(win) aW++; if(x.r.includes('Classic')) { cT++; if(win) cW++; } else { sT++; if(win) sW++; } });
            charts.r = new Chart(rc, { type:'radar', data:{ labels:['Total','Classic','Special'], datasets:[{data:[aT?aW/aT*100:0,cT?cW/cT*100:0,sT?sW/sT*100:0], backgroundColor:'rgba(76,175,80,0.2)', borderColor:'#4CAF50'}] }, options:{ scales:{r:{max:100,beginAtZero:true,grid:{color:'#444'}}}, plugins:{legend:{display:false}} } });
            if(document.getElementById('t-chart').classList.contains('active')) {
                const mc = document.getElementById('mainChart').getContext('2d'), mode = document.getElementById('vMode').value; if(charts.m) charts.m.destroy();
                if(mode==='trend'){
                    const s={}; filtered.forEach(x=>{ const dt=x.t.split(' ')[0]; s[dt]=(s[dt]||{w:0,t:0}); s[dt].t++; if(isW(x.res))s[dt].w++; }); const l=Object.keys(s).sort();
                    charts.m = new Chart(mc, { type:'line', data:{labels:l, datasets:[{label:'Win%', data:l.map(v=>(s[v].w/s[v].t*100).toFixed(1)), borderColor:'#4CAF50'}]}, options:{maintainAspectRatio:false} });
                } else if(mode==='time'){
                    const s = Array.from({length:24}, ()=>({w:0,t:0})); filtered.forEach(x=>{ const h=parseInt((x.t.match(/\s(\d+):/)||[0,0])[1]); s[h].t++; if(isW(x.res)) s[h].w++; });
                    charts.m = new Chart(mc, { type:'bar', data:{labels:s.map((_,i)=>i+'h'), datasets:[{type:'line', data:s.map(x=>x.t?x.w/x.t*100:0), borderColor:'#4CAF50'}, {type:'bar', data:s.map(x=>x.t), backgroundColor:'rgba(100,181,246,0.3)'}]}, options:{maintainAspectRatio:false} });
                }
            }
        }

        function updUi() {
            if(!filtered.length) return;
            const f = document.getElementById('ui-face'), m = document.getElementById('ui-msg');
            let w=0, n=0, d=0; filtered.forEach(x=>{ if(isW(x.res)) w++; const h=parseInt((x.t.match(/\s(\d+):/)||[0,0])[1]); if(h>=0&&h<=4)n++; if(h>=10&&h<=16)d++; });
            const r = (w/filtered.length*100);
            const DB = {
                night: { f: "face_tired.png", t: [`深夜に ${n} 回もプレイ？ 非論理的ね。寝なさい。`, `この深夜ログ、脳が死んでるわ。早く寝なよ。`] },
                work: { f: "face_angry.png", t: [`日中に ${d} 回の記録。……今、仕事中じゃないの？`, `就業時間中にツールを弄るな。業務を優先しなさい。`] },
                high: { f: "face_tsundere.png", t: [`勝率 ${r.toFixed(1)}%……。ま、当然の結果ね。`, `へぇ、悪くないじゃない。別に褒めてないわよ。`] },
                low: { f: "face_sigh.png", t: [`勝率 ${r.toFixed(1)}%……。泥沼ね。休息しなさい。`, `あまりに非論理的な敗北。大人しくログアウトしなさい。`] },
                normal: { f: "face_normal.png", t: [`勝率 ${r.toFixed(1)}%。平均的ね。次。`, `特に可もなく不可もないスタッツ。`] }
            };
            let c = "normal"; const rnd = Math.random();
            if(n>0 && rnd > 0.3) c = "night"; else if(d>0 && rnd > 0.4) c = "work"; else if(r>=70) c = "high"; else if(r<30 && filtered.length > 5) c = "low";
            f.src = DB[c].f; m.innerText = DB[c].t[Math.floor(Math.random()*DB[c].t.length)];
        }
    </script>
</body>
</html>
