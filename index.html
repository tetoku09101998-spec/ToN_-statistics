<!DOCTYPE html>

    <style>

            --panel-bg: #222;
            --control-bg: #333;
            --accent-color: #4CAF50;
            --sub-accent: #64B5F6;
            --unbound-accent: #ba68c8;
            --text-color: #eee;
            --border-color: #444;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .header-container { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 25px; }
        .header-links { display: flex; gap: 10px; align-items: center; }
        .btn-link { text-decoration: none; font-size: 13px; border-radius: 20px; padding: 6px 16px; transition: 0.2s; font-weight: bold; border: 1px solid transparent; }
        .btn-readme { color: var(--sub-accent); border-color: var(--sub-accent); }
        .btn-github { color: var(--accent-color); border-color: var(--accent-color); }
        .lang-select { background: var(--control-bg); color: #fff; border: 1px solid #555; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .controls { background: var(--panel-bg); padding: 20px; border-radius: 12px; margin: 0 auto 25px auto; max-width: 1100px; text-align: left; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; border: 1px solid var(--border-color); }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-input-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .btn-upload { background: var(--control-bg); border: 1px solid #555; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        select { background: var(--control-bg); color: #fff; border: 1px solid #555; padding: 8px 12px; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .tabs { display: flex; justify-content: center; border-bottom: 2px solid var(--border-color); max-width: 1100px; margin: 0 auto 20px auto; }
        .tab-btn { background: transparent; border: none; color: #777; padding: 12px 25px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--panel-bg); color: var(--accent-color); border-bottom: 3px solid var(--accent-color); }
        .tab-content { display: none; background: var(--panel-bg); padding: 25px; border-radius: 12px; width: 95%; max-width: 1100px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .tab-content.active { display: block; }
        .chart-container { width: 100%; height: 450px; position: relative; margin: 20px auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 13px; }
        .win-text { color: var(--accent-color); font-weight: bold; }
        .lost-text { color: #F44336; font-weight: bold; }
        .unbound-card { background: #2a2a2a; padding: 15px; border-radius: 8px; border-top: 3px solid var(--unbound-accent); text-align: left; }
        .unbound-killer { display: inline-block; margin: 2px 4px 2px 0; background: #333; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    </style>

                const key = el.getAttribute('data-i18n');
                el.textContent = i18n[currentLang][key] || key;
            });

        function switchTab(tabId) {
            // 全タブとボタンのactiveクラスを外す
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => {
                el.classList.remove('active');
            });
            // 対象のタブとボタンにactiveクラスを付与
            document.getElementById(tabId).classList.add('active');
            document.querySelector(`button[onclick="switchTab('${tabId}')"]`).classList.add('active');

            // チャートタブに切り替えた場合は再描画

                updateChart();
            }
        }
        
        // ★ エラーハンドリングを追加した安全なパース処理
        function parseCSV(textData) {
            try {
                const lines = textData.trim().split('\n');
                if (lines.length < 2) {
                    alert("データが空か、ヘッダーしかありません。");
                    return;
                }

                parsedData = lines.slice(1).map(line => {
                    const columns = line.split(',');
                    if (columns.length < 5) return null; // 列が足りない不正な行を弾く
                    
                    const timestamp = (columns[0] || "").trim();
                    const map = (columns[1] || "").trim();
                    const roundType = (columns[2] || "").trim();
                    const result = (columns[columns.length - 1] || "").trim();
                    // 中間にあるテラーの配列を結合
                    const killers = columns.slice(3, columns.length - 1).join(',').trim(); 
                    
                    return { timestamp, map, roundType, killers, result };
                }).filter(data => data !== null && data.timestamp !== "");

                if (parsedData.length === 0) {
                    alert("有効なデータが読み込めませんでした。");
                }
            } catch (error) {
                alert("CSVのパース中にエラーが発生しました。データ形式を見直してください。");
                console.error(error);
                parsedData = [];
            }
        }

            parsedData.forEach(data => {
                rounds.add(data.roundType);
                maps.add(data.map);
                if (data.killers && data.killers !== 'None') {
                    data.killers.split('/').forEach(killer => killers.add(killer.trim()));
                }
            });

            // 現在の選択状態を保持
            const currentRound = document.getElementById('roundFilter').value;
            const currentMap = document.getElementById('mapFilter').value;
            const currentKiller = document.getElementById('killerFilter').value;

            // セレクトボックスを構築するヘルパー関数
            const fillSelect = (id, set, i18nKey, savedValue) => {
                const el = document.getElementById(id);
                el.innerHTML = `<option value="all">${i18n[currentLang][i18nKey]}</option>`;
                Array.from(set).sort().forEach(value => {
                    const isSelected = (value === savedValue) ? 'selected' : '';
                    el.innerHTML += `<option value="${value}" ${isSelected}>${value}</option>`;
                });
            };

            fillSelect('roundFilter', rounds, 'opt_all_round', currentRound);
            fillSelect('mapFilter', maps, 'opt_all_map', currentMap);
            fillSelect('killerFilter', killers, 'opt_all_killer', currentKiller);
            
            document.getElementById('viewSelector').disabled = false;
        }

        function updateAll() {
            const rf = document.getElementById('roundFilter').value;
            const mf = document.getElementById('mapFilter').value;
            const kf = document.getElementById('killerFilter').value;
            const excludeClassic = document.getElementById('excludeClassicCheckbox').checked;

            filteredData = parsedData.filter(data => {
                const matchRound = (rf === 'all' || data.roundType === rf);
                const matchMap = (mf === 'all' || data.map === mf);
                const matchKiller = (kf === 'all' || (data.killers && data.killers.includes(kf)));
                const isClassic = data.roundType.includes('クラシック') || data.roundType.includes('Classic');
                
                return matchRound && matchMap && matchKiller && !(excludeClassic && isClassic);
            });

            updateDashboard();
            updateRadar();
            renderTable();
            updateUnboundList();
            
            if (document.getElementById('tab-analytics').classList.contains('active')) {
                updateChart();
            }
        }

        function updateDashboard() {
            let wins = 0;
            let losses = 0;
            const roundCount = {};
            const mapCount = {};
            const killerCount = {};

            if (filteredData.length > 0) {
                document.getElementById('firstPlayDate').textContent = filteredData[0].timestamp || "-";
                document.getElementById('lastPlayDate').textContent = filteredData[filteredData.length - 1].timestamp || "-";
            }

            filteredData.forEach(data => {
                if (isWin(data.result)) {
                    wins++;
                } else {
                    losses++;
                }

                if (data.roundType) roundCount[data.roundType] = (roundCount[data.roundType] || 0) + 1;
                if (data.map) mapCount[data.map] = (mapCount[data.map] || 0) + 1;
                
                if (data.killers && data.killers !== 'None') {
                    data.killers.split('/').forEach(killer => {
                        const k = killer.trim();
                        killerCount[k] = (killerCount[k] || 0) + 1;
                    });
                }
            });

            const totalGames = wins + losses;
            document.getElementById('totalGames').textContent = totalGames;
            document.getElementById('totalWins').textContent = wins;
            document.getElementById('totalLost').textContent = losses;
            document.getElementById('winRate').textContent = totalGames > 0 ? ((wins / totalGames) * 100).toFixed(1) : 0;

            // TOP表示用のヘルパー関数
            const renderTopList = (counts, total, color, label) => {
                let html = `<div style="background:#2a2a2a; padding:15px; border-radius:8px; flex:1; text-align:left;">`;
                html += `<strong style="color:${color}; display:block; margin-bottom:10px;">${label}</strong>`;
                
                Object.entries(counts)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 10)
                    .forEach(([name, count]) => {
                        const percentage = ((count / total) * 100).toFixed(1);
                        html += `<span style="display:block; margin-bottom:5px; background:#333; padding:5px 10px; border-radius:4px; font-size:12px;">`;
                        html += `${name}: ${percentage}% (${count})`;
                        html += `</span>`;
                    });
                return html + '</div>';
            };

            const safeDataLength = filteredData.length || 1;
            const totalKillers = Object.values(killerCount).reduce((a, b) => a + b, 0) || 1;

            const htmlOutput = 
                renderTopList(roundCount, safeDataLength, '#4CAF50', 'Round Type') + 
                renderTopList(mapCount, safeDataLength, '#2196F3', 'Map') + 
                renderTopList(killerCount, totalKillers, '#F44336', 'Terror');
                
            document.getElementById('appearanceRates').innerHTML = htmlOutput;
        }

        function renderTable() {
            const tableBody = document.getElementById('historyTableBody');
            const reversedData = filteredData.slice().reverse();
            const totalPages = Math.ceil(reversedData.length / rowsPerPage) || 1;
            
            tableBody.innerHTML = '';
            
            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = currentPage * rowsPerPage;
            
            reversedData.slice(startIndex, endIndex).forEach(data => {
                const win = isWin(data.result);
                const resultClass = win ? 'win-text' : 'lost-text';
                tableBody.innerHTML += `
                    <tr>
                        <td>${data.timestamp}</td>
                        <td>${data.map}</td>
                        <td>${data.roundType}</td>
                        <td>${data.killers}</td>
                        <td class="${resultClass}">${data.result}</td>
                    </tr>
                `;
            });

            document.getElementById('pageInfo').textContent = (currentLang === 'ja') ? `ページ ${currentPage} / ${totalPages}` : `Page ${currentPage} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = (currentPage === 1);
            document.getElementById('nextBtn').disabled = (currentPage === totalPages);
        }

        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }

        function updateRadar() {
            const ctx = document.getElementById('radarChartCanvas').getContext('2d');
            if (myRadarChart) myRadarChart.destroy();

            const stats = {
                allWin: 0, allTotal: 0,
                classicWin: 0, classicTotal: 0,
                specialWin: 0, specialTotal: 0,
                singleWin: 0, singleTotal: 0,
                multiWin: 0, multiTotal: 0
            };

            filteredData.forEach(data => {
                const win = isWin(data.result);
                stats.allTotal++;
                if (win) stats.allWin++;

                const roundType = (data.roundType || "");
                const killers = (data.killers || "");

                if (roundType.includes('クラシック') || roundType.includes('Classic')) {
                    stats.classicTotal++;
                    if (win) stats.classicWin++;
                } else {
                    stats.specialTotal++;
                    if (win) stats.specialWin++;
                }

                if (killers.includes('/')) {
                    stats.multiTotal++;
                    if (win) stats.multiWin++;
                } else if (killers !== 'None' && killers !== "") {
                    stats.singleTotal++;
                    if (win) stats.singleWin++;
                }
            });

            const calcRate = (w, t) => t > 0 ? Math.round((w / t) * 100) : 0;
            const radarData = [
                calcRate(stats.allWin, stats.allTotal),
                calcRate(stats.classicWin, stats.classicTotal),
                calcRate(stats.specialWin, stats.specialTotal),
                calcRate(stats.singleWin, stats.singleTotal),
                calcRate(stats.multiWin, stats.multiTotal)
            ];

            myRadarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: i18n[currentLang].radar_labels,
                    datasets: [{
                        label: i18n[currentLang].radar_title,
                        data: radarData,
                        backgroundColor: 'rgba(76,175,80,0.2)',
                        borderColor: '#4CAF50'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            ticks: { display: false, max: 100 },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#ccc' }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateUnboundList() {
            const listEl = document.getElementById('unboundDynamicList');
            listEl.innerHTML = '';
            const unboundDiscovery = {};

            filteredData.forEach(data => {
                const roundType = (data.roundType || "");
                if (roundType.includes('Unbound') || roundType.includes('アンバウンド')) {
                    let setId = "Unknown";
                    const killersInRound = (data.killers || "").split('/').map(k => k.trim());
                    
                    for (const [id, list] of Object.entries(UNBOUND_MASTER)) {
                        if (killersInRound.some(k => list.includes(k))) {
                            setId = id;
                            break;
                        }
                    }

                    if (!unboundDiscovery[setId]) {
                        unboundDiscovery[setId] = new Set();
                    }
                    
                    killersInRound.forEach(k => {
                        if (k !== 'None' && k !== "") {
                            unboundDiscovery[setId].add(k);
                        }
                    });
                }
            });

            const sortedSets = Object.keys(unboundDiscovery).sort((a, b) => {
                if (a === "Unknown") return 1;
                if (b === "Unknown") return -1;
                return parseInt(a) - parseInt(b);
            });

            if (sortedSets.length === 0) {
                listEl.innerHTML = `<p style="color: #888; grid-column: 1/-1;">${i18n[currentLang].no_data_unbound}</p>`;
                return;
            }

            sortedSets.forEach(id => {
                const card = document.createElement('div');
                card.className = 'unbound-card';
                
                let killerHtml = '';
                Array.from(unboundDiscovery[id]).sort().forEach(k => {
                    killerHtml += `<span class="unbound-killer">${k}</span>`;
                });
                
                card.innerHTML = `<strong style="color:var(--unbound-accent); display:block; margin-bottom:10px;">Set #${id}</strong>${killerHtml}`;
                listEl.appendChild(card);
            });
        }

        function updateChart() {
            const mode = document.getElementById('viewSelector').value;
            const ctx = document.getElementById('resultChart').getContext('2d');
            
            if (myChart) myChart.destroy();
            if (filteredData.length === 0) return;
            
            if (mode === 'dailyTrend') {
                const stats = {};
                filteredData.forEach(data => {
                    const date = data.timestamp.split(' ')[0];
                    if (!stats[date]) stats[date] = { win: 0, total: 0 };
                    stats[date].total++;
                    if (isWin(data.result)) stats[date].win++;
                });
                
                const labels = Object.keys(stats).sort();
                const rates = labels.map(date => ((stats[date].win / stats[date].total) * 100).toFixed(1));

                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Win %',
                            data: rates,
                            borderColor: '#4CAF50',
                            fill: true,
                            backgroundColor: 'rgba(76,175,80,0.1)'
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
                });
            
            } else if (mode === 'timeOfDay') {
                const stats = Array.from({ length: 24 }, () => ({ win: 0, total: 0 }));
                filteredData.forEach(data => {
                    if (!data.timestamp) return;
                    const match = data.timestamp.match(/\s(\d{1,2}):/);
                    if (match) {
                        const hour = parseInt(match[1], 10);
                        stats[hour].total++;
                        if (isWin(data.result)) stats[hour].win++;
                    }
                });

                const labels = stats.map((_, i) => `${i}時`);
                const rates = stats.map(x => x.total > 0 ? ((x.win / x.total) * 100).toFixed(1) : 0);
                const totals = stats.map(x => x.total);

                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { type: 'line', label: 'Win Rate (%)', data: rates, borderColor: '#4CAF50', backgroundColor: '#4CAF50', yAxisID: 'y' },
                            { type: 'bar', label: 'Total Games', data: totals, backgroundColor: 'rgba(100, 181, 246, 0.5)', yAxisID: 'y1' }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            y: { type: 'linear', position: 'left', max: 100, beginAtZero: true, title: { display: true, text: 'Win Rate (%)' } },
                            y1: { type: 'linear', position: 'right', beginAtZero: true, grid: { drawOnChartArea: false }, title: { display: true, text: 'Games Played' } }
                        }
                    }
                });

            } else if (['roundType', 'map', 'killer'].includes(mode)) {
                const stats = {};
                filteredData.forEach(data => {
                    const items = (mode === 'killer') ? (data.killers || "").split('/') : [data[mode]];
                    
                    items.forEach(item => {
                        const val = item.trim();
                        if (!val || val === 'None') return;
                        if (!stats[val]) stats[val] = { win: 0, lost: 0 };
                        
                        if (isWin(data.result)) {
                            stats[val].win++;
                        } else {
                            stats[val].lost++;
                        }
                    });
                });

                const sortedLabels = Object.keys(stats)
                    .sort((a, b) => (stats[b].win + stats[b].lost) - (stats[a].win + stats[a].lost))
                    .slice(0, 20);

                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: sortedLabels,
                        datasets: [
                            { label: 'Win', data: sortedLabels.map(x => stats[x].win), backgroundColor: '#4CAF50' },
                            { label: 'Lost', data: sortedLabels.map(x => stats[x].lost), backgroundColor: '#F44336' }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: { x: { stacked: true }, y: { stacked: true } },
                        onClick: (e, elements) => {
                            if (elements.length > 0 && mode === 'killer') {
                                showNemesis(myChart.data.labels[elements[0].index]);
                            }
                        }
                    }
                });
            
            } else {
                // Rate (Pie Charts)
                const key = mode.replace('Rate', '');
                const stats = {};
                
                filteredData.forEach(data => {
                    const items = (key === 'killer') ? (data.killers || "").split('/') : [data[key]];
                    items.forEach(item => {
                        const val = item.trim();
                        if (val && val !== 'None') {
                            stats[val] = (stats[val] || 0) + 1;
                        }
                    });
                });

                const sorted = Object.entries(stats).sort((a, b) => b[1] - a[1]);
                let labels = [];
                let counts = [];
                let cumulative = 0;
                const total = sorted.reduce((acc, curr) => acc + curr[1], 0);

                sorted.forEach(([name, count]) => {
                    if ((cumulative / total < 0.5 || labels.length < 10) && labels.length < 50) {
                        labels.push(name);
                        counts.push(count);
                        cumulative += count;
                    } else {
                        if (!labels.includes("Others")) {
                            labels.push("Others");
                            counts.push(0);
                        }
                        counts[labels.length - 1] += count;
                    }
                });

                myChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: counts,
                            backgroundColor: labels.map((_, i) => `hsl(${(i * 360) / labels.length},70%,50%)`)
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { position: 'right', labels: { color: '#ccc', boxWidth: 15, font: { size: 10 } } } }
                    }
                });
            }
        }

        function showNemesis(nemesisName) {
            let win = 0;
            let lost = 0;
            let total = 0;
            const mapStats = {};

            filteredData.forEach(data => {
                if ((data.killers || "").includes(nemesisName)) {
                    total++;
                    if (isWin(data.result)) {
                        win++;
                    } else {
                        lost++;
                    }
                    mapStats[data.map] = (mapStats[data.map] || 0) + 1;
                }
            });

            const sortedMaps = Object.entries(mapStats).sort((a, b) => b[1] - a[1]);
            const topMap = sortedMaps[0] || ["-", 0];

            document.getElementById('nemName').textContent = nemesisName;
            document.getElementById('nemDetails').innerHTML = `
                <span style="background:rgba(0,0,0,0.3); padding:5px 10px; border-radius:4px; margin-right:10px;">Encounters: ${total}</span>
                <span style="color:var(--accent-color);">Win: ${win}</span> | 
                <span style="color:#F44336;">Lost: ${lost}</span><br>
                Top Map: ${topMap[0]} (${topMap[1]})
            `;
            document.getElementById('nemesisBox').style.display = 'block';
        }

        // 初期化処理
        updateUI();
    </script>
</body>
</html>
