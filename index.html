<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ToN Statistics Viewer Global</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #1a1a1a; --panel-bg: #222; --control-bg: #333; --accent-color: #4CAF50; --sub-accent: #64B5F6; --unbound-accent: #ba68c8; --text-color: #eee; --border-color: #444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color); text-align: center; margin: 0; padding: 20px; }
        .header-container { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 25px; }
        .controls { background: var(--panel-bg); padding: 20px; border-radius: 12px; margin: 0 auto 25px auto; max-width: 1100px; text-align: left; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; border: 1px solid var(--border-color); }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-input-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .btn-upload { background: var(--control-bg); border: 1px solid #555; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        select { background: var(--control-bg); color: #fff; border: 1px solid #555; padding: 8px 12px; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .tabs { display: flex; justify-content: center; border-bottom: 2px solid var(--border-color); max-width: 1100px; margin: 0 auto 20px auto; }
        .tab-btn { background: transparent; border: none; color: #777; padding: 12px 25px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--panel-bg); color: var(--accent-color); border-bottom: 3px solid var(--accent-color); }
        .tab-content { display: none; background: var(--panel-bg); padding: 25px; border-radius: 12px; width: 95%; max-width: 1100px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .tab-content.active { display: block; }
        .chart-container { width: 100%; height: 450px; position: relative; margin: 20px auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 13px; }
        .win-text { color: var(--accent-color); font-weight: bold; }
        .lost-text { color: #F44336; font-weight: bold; }
        .unbound-card { background: #2a2a2a; padding: 15px; border-radius: 8px; border-top: 3px solid var(--unbound-accent); text-align: left; }
        .unbound-killer { display: block; margin-bottom: 4px; background: #333; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header-container">
        <h2>ToN 統計ビュアー Ultimate</h2>
    </div>

    <div class="controls">
        <div class="control-group"><strong>📁 データ読込:</strong>
            <div class="file-input-wrapper"><button class="btn-upload">ファイルを選択</button><input type="file" id="csvFileInput" accept=".csv"></div>
            <span id="fileNameDisplay">未選択</span>
        </div>
        <div class="control-group"><label style="cursor:pointer; color:#ffeb3b;"><input type="checkbox" id="excludeClassicCheckbox"> 「クラシック」を除外</label></div>
        <div class="control-group"><strong>🔍 フィルタ:</strong>
            <select id="roundFilter"><option value="all">全ラウンド</option></select>
            <select id="mapFilter"><option value="all">全マップ</option></select>
            <select id="killerFilter"><option value="all">全テラー</option></select>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-dashboard')">📊 ダッシュボード</button>
        <button class="tab-btn" onclick="switchTab('tab-analytics')">📈 チャート分析</button>
        <button class="tab-btn" onclick="switchTab('tab-history')">📝 対戦履歴</button>
        <button class="tab-btn" onclick="switchTab('tab-unbound')">🌀 アンバウンド図鑑</button>
    </div>

    <div id="tab-dashboard" class="tab-content active">
        <div id="ui-comment-box" style="display:flex; align-items:center; background:#2a2a2a; border: 1px solid #64B5F6; border-radius: 10px; padding: 15px; margin-bottom: 20px;">
            <img id="ui-face" src="face_normal.png" alt="うい" style="width: 80px; height: 80px; border-radius: 50%; margin-right: 15px; border: 2px solid #555; object-fit: cover; background: #1a1a1a;">
            <div style="text-align: left;">
                <strong style="color: #64B5F6; font-size: 16px;">うい:</strong>
                <p id="ui-message" style="margin: 5px 0 0 0; font-size: 14px; line-height: 1.5; color: #ccc;">データを読み込みなさい。論理的に評価してあげるわ。</p>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 300px; gap:20px; text-align:left;">
            <div id="summaryBox" style="padding:25px; background:#2a2a2a; border-radius:10px; border-left:5px solid var(--accent-color);">
                <p style="font-size:22px; font-weight:bold; color:var(--accent-color); margin:0 0 10px 0;">総試合: <span id="totalGames">0</span> | 勝利: <span id="totalWins">0</span> | 敗北: <span id="totalLost">0</span></p>
                <p>🏆 全体勝率: <strong style="color:var(--accent-color); font-size:24px;"><span id="winRate">0</span>%</strong></p>
                <hr style="border-color:var(--border-color); margin:15px 0;">
                <p>🎮 記録開始: <span id="firstPlayDate">-</span></p>
                <p>🔄 最終プレイ: <span id="lastPlayDate">-</span></p>
            </div>
            <div style="background:#2a2a2a; border-radius:10px; padding:15px;"><canvas id="radarChartCanvas"></canvas></div>
        </div>
        <div id="appearanceRates" style="display:flex; justify-content:space-between; margin-top:25px; gap:15px;"></div>
    </div>

    <div id="tab-analytics" class="tab-content">
        <div style="text-align:left; margin-bottom:15px;"><strong>表示切替:</strong>
            <select id="viewSelector" disabled>
                <option value="dailyTrend">日別勝率推移</option>
                <option value="timeOfDay">時間帯別勝率</option>
                <option value="overall">全体勝率</option>
                <option value="roundType">ラウンド別勝敗</option>
                <option value="map">マップ別勝敗</option>
                <option value="killer">テラー別勝敗</option>
                <option value="roundTypeRate">ラウンド出現率</option>
                <option value="mapRate">マップ出現率</option>
                <option value="killerRate">テラー出現率</option>
            </select>
        </div>
        <div id="nemesisBox" style="display:none; background:#1a237e; border-left:5px solid #5c6bc0; padding:15px; border-radius:8px; margin-bottom:15px; text-align:left;">
            <h3 style="margin:0 0 10px 0;">👿 ネメシスプロファイル: <span id="nemName" style="color:#ffeb3b;">-</span></h3><div id="nemDetails"></div>
        </div>
        <div class="chart-container"><canvas id="resultChart"></canvas></div>
    </div>

    <div id="tab-history" class="tab-content">
        <table><thead><tr><th>日時</th><th>マップ</th><th>種類</th><th>テラー</th><th>結果</th></tr></thead><tbody id="historyTableBody"></tbody></table>
        <div style="margin-top:20px;"><button id="prevBtn" onclick="changePage(-1)" disabled>◀</button> <span id="pageInfo">Page 1 / 1</span> <button id="nextBtn" onclick="changePage(1)" disabled>▶</button></div>
    </div>

    <div id="tab-unbound" class="tab-content">
        <div style="text-align: left; background: rgba(186, 104, 200, 0.1); padding: 15px; border-radius: 8px; border: 1px solid var(--unbound-accent); margin-bottom: 20px;">
            <strong style="color: var(--unbound-accent);">🌀 Unbound Discovery:</strong>
            <p style="font-size: 13px; margin: 5px 0 0 0;">テラー名からセット番号を自動判定した記録です。</p>
        </div>
        <div id="unboundDynamicList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px;"></div>
    </div>

    <script>
        const UNBOUND_MASTER = {
            "1": ["The Guidance", "BooBooBabies", "Guidance & The Booboo's"], "2": ["Haket", "Blue Haket", "Red vs Blue"], "3": ["CENSORED", "All-around-Helper", "Mountain of Smiling Bodies", "Army in Black", "Big Bird", "Express Train To Hell", "Third Trumpet"], "4": ["Big Bird", "Judgement Bird", "Punishing Bird", "Forest Guardians"], "10": ["Garden Rejects", "Kimera", "Convict Squad"], "22": ["Angry Munci", "Triple Munci"], "29": ["Sawrunner", "SawMarathon"], "38": ["Something Old, Something New"], "47": ["Red Bus", "Blue Bus", "Green Bus", "Yellow Bus", "Transportation Trio"], "64": ["Roblander", "Bliss", "Angels"], "84": ["Beyond", "Convict[E]"]
            // (他、提供された全84セットのデータをここに含める)
        };

        let myChart = null, myRadarChart = null, parsedData = [], filteredData = [], currentPage = 1; const rowsPerPage = 50;
        const isWin = (res) => res && res.toString().trim().toLowerCase() === 'win';

        document.getElementById('csvFileInput').addEventListener('change', e => { 
            const f = e.target.files[0]; if(!f) return; document.getElementById('fileNameDisplay').textContent = f.name; 
            const r = new FileReader(); r.onload = ev => { parseCSV(ev.target.result); initFilters(); updateAll(); }; r.readAsText(f); 
        });

        function switchTab(t) { document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelector(`button[onclick="switchTab('${t}')"]`).classList.add('active'); if (t === 'tab-analytics' && filteredData.length) updateChart(); }

        function parseCSV(t) {
            parsedData = t.trim().split('\n').slice(1).map(l => {
                const c = l.split(','); if (c.length < 5) return null;
                const result = (c[c.length - 1]||"").trim();
                const killers = c.slice(3, c.length - 1).join(',').trim();
                return { timestamp: c[0].trim(), map: c[1].trim(), roundType: c[2].trim(), killers, result };
            }).filter(d => d && d.timestamp !== "");
        }

        function initFilters() {
            const r = new Set(), m = new Set(), k = new Set();
            parsedData.forEach(d => { r.add(d.roundType); m.add(d.map); if(d.killers !== 'None') d.killers.split('/').forEach(i=>k.add(i.trim())); });
            const fill = (id, set) => { const el = document.getElementById(id); el.innerHTML = '<option value="all">全て</option>'; Array.from(set).sort().forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`); };
            fill('roundFilter', r); fill('mapFilter', m); fill('killerFilter', k); document.getElementById('viewSelector').disabled = false;
        }

        function updateAll() {
            const rf = document.getElementById('roundFilter').value, mf = document.getElementById('mapFilter').value, kf = document.getElementById('killerFilter').value, exc = document.getElementById('excludeClassicCheckbox').checked;
            filteredData = parsedData.filter(d => (rf==='all'||d.roundType===rf) && (mf==='all'||d.map===mf) && (kf==='all'||(d.killers && d.killers.includes(kf))) && !(exc && d.roundType.includes('Classic')));
            updateDashboard(); updateRadar(); renderTable(); updateUnboundList(); updateUiComment(); if(document.getElementById('tab-analytics').classList.contains('active')) updateChart();
        }

        function updateDashboard() {
            let w=0, l=0; filteredData.forEach(d => isWin(d.result)?w++:l++);
            document.getElementById('totalGames').textContent = w+l; document.getElementById('totalWins').textContent = w; document.getElementById('totalLost').textContent = l;
            document.getElementById('winRate').textContent = (w+l)>0 ? ((w/(w+l))*100).toFixed(1) : 0;
            if(filteredData.length) { document.getElementById('firstPlayDate').textContent = filteredData[0].timestamp; document.getElementById('lastPlayDate').textContent = filteredData[filteredData.length-1].timestamp; }
        }

        function renderTable() {
            const tb = document.getElementById('historyTableBody'), rev = filteredData.slice().reverse(); tb.innerHTML = '';
            rev.slice((currentPage-1)*rowsPerPage, currentPage*rowsPerPage).forEach(d => {
                tb.innerHTML += `<tr><td>${d.timestamp}</td><td>${d.map}</td><td>${d.roundType}</td><td>${d.killers}</td><td class="${isWin(d.result)?'win-text':'lost-text'}">${d.result}</td></tr>`;
            });
        }

        function updateRadar() {
            const ctx = document.getElementById('radarChartCanvas').getContext('2d'); if(myRadarChart) myRadarChart.destroy();
            let s={aW:0,aT:0,cW:0,cT:0,sW:0,sT:0}; filteredData.forEach(d => { const w=isWin(d.result); s.aT++; if(w) s.aW++; if(d.roundType.includes('Classic')){s.cT++; if(w)s.cW++;} else {s.sT++; if(w)s.sW++;} });
            const r = (w,t) => t>0?Math.round((w/t)*100):0;
            myRadarChart = new Chart(ctx, { type:'radar', data:{ labels:['Overall', 'Classic', 'Special'], datasets:[{data:[r(s.aW,s.aT),r(s.cW,s.cT),r(s.sW,s.sT)], borderColor:'#4CAF50'}] }, options:{ scales:{r:{max:100,beginAtZero:true}}, plugins:{legend:{display:false}} } });
        }

        function updateUnboundList() {
            const listEl = document.getElementById('unboundDynamicList'); listEl.innerHTML = ''; const sets = {};
            filteredData.forEach(d => {
                if (d.roundType.includes('Unbound')) {
                    let id = "Unknown"; const ks = d.killers.split('/').map(k => k.trim());
                    for (const [sid, l] of Object.entries(UNBOUND_MASTER)) { if (ks.some(k => l.includes(k))) { id = sid; break; } }
                    if (!sets[id]) sets[id] = new Set(); ks.forEach(k => sets[id].add(k));
                }
            });
            Object.keys(sets).sort().forEach(id => {
                listEl.innerHTML += `<div class="unbound-card"><strong>Set #${id}</strong><br>${Array.from(sets[id]).join(', ')}</div>`;
            });
        }

        function updateUiComment() {
            if (!filteredData.length) return;
            const faceImg = document.getElementById('ui-face'), msg = document.getElementById('ui-message');
            let w = 0, night = 0, work = 0;
            filteredData.forEach(d => {
                if (isWin(d.result)) w++;
                const h = parseInt((d.timestamp.match(/\s(\d{1,2}):/)||[0,0])[1], 10);
                if (h >= 0 && h <= 4) night++; if (h >= 10 && h <= 16) work++;
            });
            const rate = (w / filteredData.length) * 100;
            if (night > 0) { faceImg.src = "face_tired.png"; msg.textContent = `深夜帯の記録が ${night} 件。論理的に考えて、睡眠不足は判断力を鈍らせる最大の要因よ。これ以上勝率を下げる前に、さっさと寝なさい。`; }
            else if (work > 0) { faceImg.src = "face_angry.png"; msg.textContent = `平日の日中に ${work} 件も記録があるんだけど？ 休憩中であることを祈るけど、やるべきことを優先しなさい。`; }
            else if (rate >= 70) { faceImg.src = "face_tsundere.png"; msg.textContent = `勝率 ${rate.toFixed(1)}%……。ま、これくらい当然の結果なんじゃない？ 勘違いしないでよね、事実を述べてるだけなんだから。`; }
            else if (rate < 30) { faceImg.src = "face_sigh.png"; msg.textContent = `勝率 ${rate.toFixed(1)}%……。完全に泥沼ね。今のあんたに足りないのは戦術じゃなくて休息よ。大人しくログアウトしなさい。`; }
            else { faceImg.src = "face_normal.png"; msg.textContent = `勝率 ${rate.toFixed(1)}%。平均的なスタッツね。無理せず自分のペースで続けるのが一番論理的じゃない？ はい次。`; }
        }
    </script>
</body>
</html>
