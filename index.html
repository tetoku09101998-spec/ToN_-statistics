        .btn-github { color: var(--accent-color); border-color: var(--accent-color); }
        .lang-select { background: var(--control-bg); color: #fff; border: 1px solid #555; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        
        .controls { background: var(--panel-bg); padding: 20px; border-radius: 12px; margin: 0 auto 25px auto; max-width: 1100px; text-align: left; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; border: 1px solid var(--border-color); }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-input-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .btn-upload { background: var(--control-bg); border: 1px solid #555; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-clear { background: #333; border: 1px solid #555; color: #888; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-left: auto; transition: 0.2s; }
        .btn-clear:hover { background: #d32f2f; color: #fff; border-color: #f44336; }
        
        .tabs { display: flex; justify-content: center; border-bottom: 2px solid var(--border-color); max-width: 1100px; margin: 0 auto 20px auto; }
        .tab-btn { background: transparent; border: none; color: #777; padding: 12px 25px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--panel-bg); color: var(--accent-color); border-bottom: 3px solid var(--accent-color); }
        
        .tab-content { display: none; background: var(--panel-bg); padding: 25px; border-radius: 12px; width: 95%; max-width: 1100px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .tab-content.active { display: block; }
        
        /* ういの診断パネル */
        .ui-diagnosis-panel { background: #2d2d3a; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 6px solid var(--sub-accent); text-align: left; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .ui-avatar { width: 100px; height: 100px; border-radius: 50%; background: #444; border: 3px solid var(--sub-accent); object-fit: cover; flex-shrink: 0; box-shadow: 0 0 10px rgba(100, 181, 246, 0.2); }
        .ui-name { font-weight: bold; color: var(--sub-accent); font-size: 16px; display: block; margin-bottom: 8px; }
        .ui-text { font-size: 15px; line-height: 1.6; color: #eee; }

        .stat-card { background: #2a2a2a; padding: 20px; border-radius: 10px; border-left: 5px solid var(--accent-color); }
        .streak-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-left: 10px; }
        .win-streak { background: #1b5e20; color: #81c784; }
        .lost-streak { background: #b71c1c; color: #e57373; }
        
        .analysis-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .analysis-item { background: #333; padding: 12px; border-radius: 8px; text-align: center; }
        .analysis-label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }
        .analysis-value { font-size: 18px; font-weight: bold; color: #fff; }

        .chart-container { width: 100%; height: 450px; position: relative; margin: 20px auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 13px; }
        .win-text { color: var(--accent-color); font-weight: bold; }
        .lost-text { color: #F44336; font-weight: bold; }
        
        .unbound-card { background: #2a2a2a; padding: 15px; border-radius: 8px; border-top: 3px solid var(--unbound-accent); text-align: left; }

            const saved = localStorage.getItem('ton_ultimate_perfect');
            if (saved) { parsedData = JSON.parse(saved); initFilters(); updateAll(); }
            updateUI();

        function updateUI() { 
            document.querySelectorAll('[data-i18n]').forEach(el => { 
                const k = el.getAttribute('data-i18n'); 
                if(i18n[currentLang][k]) el.innerHTML = i18n[currentLang][k]; 
            }); 
            if(parsedData.length > 0) { initFilters(); updateAll(); }
        }

        document.getElementById('csvFileInput').addEventListener('change', e => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = ev => { parseCSV(ev.target.result); localStorage.setItem('ton_ultimate_perfect', JSON.stringify(parsedData)); document.getElementById('fileNameDisplay').textContent = f.name; initFilters(); updateAll(); };
            r.readAsText(f);
        });

        document.getElementById('clearDataBtn').addEventListener('click', () => { if(confirm("消去するわよ？")) { localStorage.removeItem('ton_ultimate_perfect'); location.reload(); } });

        // ★ HTMLエンティティを解読する関数
        const decodeHTML = (html) => {
            const txt = document.createElement("textarea");
            txt.innerHTML = html;
            return txt.value;
        };

        // ★ 本格的CSVパーサー（カンマを含む名前、HTMLエンティティに完全対応）
        function parseCSV(t) {
            parsedData = [];
            const lines = t.trim().split('\n');
            for (let i = 1; i < lines.length; i++) {
                const l = lines[i].trim();
                if (!l) continue;
                const c = [];
                let inQ = false, val = '';
                for (let j = 0; j < l.length; j++) {
                    if (l[j] === '"') { inQ = !inQ; }
                    else if (l[j] === ',' && !inQ) { c.push(val.trim()); val = ''; }
                    else { val += l[j]; }
                }
                c.push(val.trim());
                
                if (c.length >= 5) {
                    const kRaw = c.slice(3, c.length - 1).join(',');
                    const k = decodeHTML(kRaw);
                    parsedData.push({
                        timestamp: c[0], map: c[1], roundType: c[2], killers: k, result: c[c.length - 1]
                    });
                }
            }
        }

        function initFilters() {
            const r = new Set(), m = new Set(), k = new Set();
            parsedData.forEach(d => { r.add(d.roundType); m.add(d.map); if(d.killers && d.killers !== 'None') d.killers.split('/').forEach(i=>k.add(i.trim())); });
            const fill = (id, set, key) => { const el = document.getElementById(id); const val = el.value; el.innerHTML = `<option value="all">${i18n[currentLang][key]}</option>`; Array.from(set).sort().forEach(v => el.innerHTML += `<option value="${v}" ${v===val?'selected':''}>${v}</option>`); };
            fill('roundFilter', r, 'opt_all_round'); fill('mapFilter', m, 'opt_all_map'); fill('killerFilter', k, 'opt_all_killer');
            document.getElementById('viewSelector').disabled = false;
        }

        function updateAll() {
            const rf = document.getElementById('roundFilter').value, mf = document.getElementById('mapFilter').value, kf = document.getElementById('killerFilter').value, exc = document.getElementById('excludeClassicCheckbox').checked;
            const sd = document.getElementById('startDateFilter').value, ed = document.getElementById('endDateFilter').value;
            filteredData = parsedData.filter(d => {
                const dObj = new Date(d.timestamp);
                const dateMatch = (!sd || dObj >= new Date(sd)) && (!ed || dObj <= new Date(ed + " 23:59:59"));
                const filterMatch = (rf==='all'||d.roundType===rf) && (mf==='all'||d.map===mf) && (kf==='all'||(d.killers && d.killers.includes(kf)));
                const classicMatch = !(exc && (d.roundType.includes('クラシック')||d.roundType.includes('Classic')));
                return dateMatch && filterMatch && classicMatch;
            });
            currentPage = 1;
            updateDashboard(); updateRadar(); renderTable(); updateUnboundList(); updateUiDiagnosis();
            if(document.getElementById('tab-analytics').classList.contains('active')) updateChart();
        }

        function updateUiDiagnosis() {
            const panel = document.getElementById('uiDiagnosisPanel');
            const msg = document.getElementById('uiMessage');
            const avatar = document.getElementById('uiAvatarImg');
            
            if (filteredData.length === 0) { panel.style.display = 'none'; return; }
            panel.style.display = 'flex';
            
            const w = filteredData.filter(d => isWin(d.result)).length;
            const rate = (w / filteredData.length) * 100;
            
            if (currentLang === 'ja') {
                if (rate >= 80) {
                    msg.textContent = "勝率80%超え？ 嘘でしょ、あんた。……まぁ、よく頑張ったのは認めてあげるわ。";
                    avatar.src = "ui_smile.png";
                } else if (rate >= 50) {
                    msg.textContent = "勝率半分以上。及第点ね。でも、もっと上を目指せるはずでしょ？";
                    avatar.src = "ui_normal.png";
                } else if (rate >= 30) {
                    msg.textContent = "勝率30%台……。平凡すぎて欠伸が出るわ。もっと真面目にやりなさい。";
                    avatar.src = "ui_sigh.png";
                } else {
                    msg.textContent = "勝率30%未満。ねえ、画面見てる？ 病院か、算数からやり直したら？";
                    avatar.src = "ui_glare.png";
                }
            } else {
                if (rate >= 80) {
                    msg.textContent = "Over 80%? Are you kidding me... Well, I'll admit you did a good job.";
                    avatar.src = "ui_smile.png";
                } else if (rate >= 50) {
                    msg.textContent = "Over 50%. A passing grade. But you can aim higher, right?";
                    avatar.src = "ui_normal.png";
                } else if (rate >= 30) {
                    msg.textContent = "In the 30s... So painfully average it makes me yawn. Play more seriously.";
                    avatar.src = "ui_sigh.png";
                } else {
                    msg.textContent = "Under 30%? Are you even looking at the screen? Go to a hospital, or back to elementary math.";
                    avatar.src = "ui_glare.png";
                }
            }
        }

        function updateDashboard() {
            let w=0, l=0; const kS = {}, rC={}, mC={}, kC={};
            let curStr = 0, isWStr = false, maxW = 0, maxL = 0, tW = 0, tL = 0;

            filteredData.forEach((d, i) => {
                const win = isWin(d.result); win?w++:l++;
                if(win) { tW++; maxL = Math.max(maxL, tL); tL = 0; }
                else { tL++; maxW = Math.max(maxW, tW); tW = 0; }
                if(i === filteredData.length - 1) { maxW = Math.max(maxW, tW); maxL = Math.max(maxL, tL); curStr = win ? tW : tL; isWStr = win; }
                
                if(d.roundType) rC[d.roundType] = (rC[d.roundType]||0)+1;
                if(d.map) mC[d.map] = (mC[d.map]||0)+1;
                
                if(d.killers && d.killers !== 'None') {
                    d.killers.split('/').forEach(k => {
                        const v=k.trim();
                        if(isExcludedKiller(v)) return;
                        kS[v] = kS[v] || {w:0, t:0}; kS[v].t++; if(win) kS[v].w++;
                        kC[v] = (kC[v]||0)+1;
                    });
                }
            });

            document.getElementById('totalGames').textContent = w+l;
            document.getElementById('winRate').textContent = (w+l)>0 ? ((w/(w+l))*100).toFixed(1) : 0;
            const sB = document.getElementById('streakBadge');
            if(filteredData.length > 0) { sB.style.display = 'inline'; sB.className = 'streak-badge ' + (isWStr ? 'win-streak' : 'lost-streak'); sB.textContent = curStr + (isWStr ? (currentLang==='ja'?' 連勝中':' Win Streak') : (currentLang==='ja'?' 連敗中':' Loss Streak')); }
            document.getElementById('statMaxWinStreak').textContent = maxW;
            document.getElementById('statMaxLostStreak').textContent = maxL;

            let nem = "-", prey = "-", minR = 101, maxR = -1;
            Object.entries(kS).forEach(([name, s]) => { if(s.t >= 3) { const r = (s.w / s.t) * 100; if(r < minR) { minR = r; nem = name; } if(r > maxR) { maxR = r; prey = name; } } });
            document.getElementById('statNemesis').textContent = nem + (nem!=="-" ? ` (${minR.toFixed(0)}%)` : "");
            document.getElementById('statPrey').textContent = prey + (prey!=="-" ? ` (${maxR.toFixed(0)}%)` : "");

            const render = (counts, total, color, label) => {
                let h = `<div style="background:#2a2a2a; padding:15px; border-radius:8px; flex:1; text-align:left;"><strong style="color:${color}; display:block; margin-bottom:10px;">${label}</strong>`;
                Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([n,v])=> { h += `<span style="display:block; margin-bottom:5px; background:#333; padding:5px 10px; border-radius:4px; font-size:12px;">${n}: ${((v/total)*100).toFixed(1)}% (${v})</span>`; });
                return h + '</div>';
            };
            const tK = Object.values(kC).reduce((a,b)=>a+b,0) || 1;
            document.getElementById('appearanceRates').innerHTML = (filteredData.length > 0) ? render(rC, filteredData.length, '#4CAF50', 'Round') + render(mC, filteredData.length, '#2196F3', 'Map') + render(kC, tK, '#F44336', 'Terror') : '';
        }

        function updateChart() {
            const mode = document.getElementById('viewSelector').value, ctx = document.getElementById('resultChart').getContext('2d');
            if(myChart) { myChart.destroy(); myChart = null; }
            if(!filteredData.length) return;

            if(mode === 'overall') {
                const w = filteredData.filter(d => isWin(d.result)).length;
                myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Win', 'Lost'], datasets: [{ data: [w, filteredData.length - w], backgroundColor: ['#4CAF50', '#F44336'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false } });
            } else if(mode === 'dailyTrend') {
                const s={}; filteredData.forEach(d=>{ const dt=d.timestamp.split(' ')[0]; if(!s[dt])s[dt]={w:0,t:0}; s[dt].t++; if(isWin(d.result))s[dt].w++; });
                const labels=Object.keys(s).sort();
                myChart = new Chart(ctx, { type:'line', data:{labels, datasets:[{label:'Win %', data:labels.map(x=>((s[x].w/s[x].t)*100).toFixed(1)), borderColor:'#4CAF50', fill:true, backgroundColor:'rgba(76,175,80,0.1)'}]}, options:{responsive:true, maintainAspectRatio:false, scales:{y:{beginAtZero:true,max:100}}} });
            } else if(mode === 'timeOfDay') {
                const s = Array.from({length: 24}, () => ({w:0, t:0}));
                filteredData.forEach(d => { try { const h = parseInt(d.timestamp.split(' ')[1].split(':')[0]); s[h].t++; if(isWin(d.result)) s[h].w++; } catch(e){} });
                myChart = new Chart(ctx, { type:'bar', data:{ labels: s.map((_,i)=>`${i}時`), datasets:[{type:'line', label:'Win %', data:s.map(x=>x.t>0?((x.w/x.t)*100).toFixed(1):0), borderColor:'#4CAF50', yAxisID:'y'},{type:'bar', label:'Games', data:s.map(x=>x.t), backgroundColor:'rgba(100,181,246,0.5)', yAxisID:'y1'}] }, options:{responsive:true, maintainAspectRatio:false, scales:{y:{max:100,position:'left'},y1:{position:'right',grid:{drawOnChartArea:false}}}} });
            } else if(['roundType','map','killer'].includes(mode)){
                const s={}; filteredData.forEach(d=>{ const items=mode==='killer'?(d.killers||"").split('/'):[d[mode]]; items.forEach(i=>{ const v=i.trim(); 
                    if(!v||v==='None'||(mode==='killer' && isExcludedKiller(v))) return;
                    if(!s[v])s[v]={w:0,l:0}; isWin(d.result)?s[v].w++:s[v].l++; 
                }); });
                const labels = Object.keys(s).sort((a,b)=>(s[b].w+s[b].l)-(s[a].w+s[a].l)).slice(0, 20);
                myChart = new Chart(ctx, { type:'bar', data:{labels, datasets:[{label:'Win',data:labels.map(x=>s[x].w),backgroundColor:'#4CAF50'},{label:'Lost',data:labels.map(x=>s[x].l),backgroundColor:'#F44336'}]}, options:{responsive:true, maintainAspectRatio:false, scales:{x:{stacked:true},y:{stacked:true}}} });
            } else {
                const k = mode.replace('Rate', ''); const s = {};
                filteredData.forEach(d => { const items = k === 'killer' ? (d.killers || "").split('/') : [d[k]]; items.forEach(i => { const v = i.trim(); 
                    if (v && v !== 'None' && !(k==='killer' && isExcludedKiller(v))) s[v] = (s[v] || 0) + 1;
                }); });
                const sorted = Object.entries(s).sort((a, b) => b[1] - a[1]);
                let labels = [], counts = [], cum = 0; const total = sorted.reduce((a, b) => a + b[1], 0);
                if (k === 'map') { labels = sorted.map(x => x[0]); counts = sorted.map(x => x[1]); }
                else { sorted.forEach(([n, c]) => { if ((cum / total < 0.5 || labels.length < 10) && labels.length < 50) { labels.push(n); counts.push(c); cum += c; } else { if(!labels.includes("Others")) { labels.push("Others"); counts.push(0); } counts[labels.length-1] += c; } }); }
                myChart = new Chart(ctx, { type: 'pie', data: { labels, datasets: [{ data: counts, backgroundColor: labels.map((_, i) => `hsl(${(i * 360) / labels.length},70%,50%)`) }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#ccc', font: { size: 10 } } } } } });
            }
        }

        function renderTable() {
            const tb = document.getElementById('historyTableBody'), rev = filteredData.slice().reverse(), tp = Math.ceil(rev.length/rowsPerPage)||1; tb.innerHTML = '';
            rev.slice((currentPage-1)*rowsPerPage, currentPage*rowsPerPage).forEach(d => { tb.innerHTML += `<tr><td>${d.timestamp}</td><td>${d.map}</td><td>${d.roundType}</td><td>${d.killers}</td><td class="${isWin(d.result)?'win-text':'lost-text'}">${d.result}</td></tr>`; });
            document.getElementById('pageInfo').textContent = `Page ${currentPage} / ${tp}`;
            document.getElementById('prevBtn').disabled = currentPage===1; document.getElementById('nextBtn').disabled = currentPage===tp;
        }

        function changePage(d) { currentPage+=d; renderTable(); }

        function updateRadar() {
            const ctx = document.getElementById('radarChartCanvas').getContext('2d'); if(myRadarChart) myRadarChart.destroy();
            let s={aW:0,aT:0,cW:0,cT:0,sW:0,sT:0,siW:0,siT:0,muW:0,muT:0};
            filteredData.forEach(d => { const w=isWin(d.result); s.aT++; if(w) s.aW++; if(d.roundType.includes('クラシック')||d.roundType.includes('Classic')){s.cT++; if(w)s.cW++;} else {s.sT++; if(w)s.sW++;} if(d.killers.includes('/')){s.muT++; if(w)s.muW++;} else if(d.killers !== 'None' && d.killers !== ""){s.siT++; if(w)s.siW++;} });
            const r = (w,t) => t>0?Math.round((w/t)*100):0;
            myRadarChart = new Chart(ctx, { type:'radar', data:{ labels: i18n[currentLang].radar_labels, datasets:[{data:[r(s.aW,s.aT),r(s.cW,s.cT),r(s.sW,s.sT),r(s.siW,s.siT),r(s.muW,s.muT)], backgroundColor:'rgba(76,175,80,0.2)', borderColor:'#4CAF50'}] }, options:{ scales:{r:{max:100,ticks:{display:false},pointLabels:{color:'#ccc'}}}, plugins:{legend:{display:false}} } });
        }

        // ★ アンバウンド図鑑：一切のデータ欠落なし。全構成員をタグとして表示
        function updateUnboundList() {
            const listEl = document.getElementById('unboundDynamicList'); listEl.innerHTML = ''; const ds = new Set();
            filteredData.forEach(d => { if (d.roundType.includes('Unbound') || d.roundType.includes('アンバウンド')) { const ks = d.killers.split('/').map(k => k.trim()); for (const [sId, list] of Object.entries(UNBOUND_MASTER)) { if (ks.some(k => list.includes(k))) { ds.add(sId); break; } } } });
            Array.from(ds).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(id => {
                const card = document.createElement('div'); card.className = 'unbound-card'; const m = UNBOUND_MASTER[id] || [];
                const sn = m.length > 1 ? m[m.length - 1] : `Set #${id}`;
                card.innerHTML = `<span class="unbound-set-name">${sn}</span>${m.map(k => `<span class="unbound-killer-tag">${k}</span>`).join('')}`;
                listEl.appendChild(card);
            });
        }

        function downloadChartImage(id, name) { const c = document.getElementById(id); const link = document.createElement('a'); link.href = c.toDataURL('image/png'); link.download = `${name}.png`; link.click(); }
        function switchTab(t) { document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelector(`button[onclick="switchTab('${t}')"]`).classList.add('active'); if (t === 'tab-analytics' && filteredData.length) updateChart(); }
        
        document.getElementById('viewSelector').addEventListener('change', updateChart);
        document.getElementById('startDateFilter').addEventListener('change', updateAll);
        document.getElementById('endDateFilter').addEventListener('change', updateAll);
        document.getElementById('excludeClassicCheckbox').addEventListener('change', updateAll);
        document.getElementById('roundFilter').addEventListener('change', updateAll);
        document.getElementById('mapFilter').addEventListener('change', updateAll);
        document.getElementById('killerFilter').addEventListener('change', updateAll);
        document.getElementById('langSelect').addEventListener('change', e => { currentLang = e.target.value; updateUI(); });
    </script>
</body>
</html>
